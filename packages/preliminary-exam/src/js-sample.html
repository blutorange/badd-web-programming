<h1>Taschenrechner</h1>

<div class="calc">
    <output class="calc__output">0</output>
    <div class="calc__buttons">
        <button class="calc__button calc__button--ce" type="button">CE</button>
        <button class="calc__button calc__button--7" type="button">7</button>
        <button class="calc__button calc__button--8" type="button">8</button>
        <button class="calc__button calc__button--9" type="button">9</button>
        <button class="calc__button calc__button--div" type="button">/</button>

        <button class="calc__button calc__button--sqrt" type="button">√</button>
        <button class="calc__button calc__button--4" type="button">4</button>
        <button class="calc__button calc__button--5" type="button">5</button>
        <button class="calc__button calc__button--6" type="button">6</button>
        <button class="calc__button calc__button--mul" type="button">*</button>

        <button class="calc__button" type="button"></button>
        <button class="calc__button calc__button--1" type="button">1</button>
        <button class="calc__button calc__button--2" type="button">2</button>
        <button class="calc__button calc__button--3" type="button">3</button>
        <button class="calc__button calc__button--sub" type="button">-</button>

        <button class="calc__button" type="button"></button>
        <button class="calc__button calc__button--0" type="button">0</button>
        <button class="calc__button calc__button--dot" type="button">.</button>
        <button class="calc__button calc__button--eq" type="button">=</button>
        <button class="calc__button calc__button--add" type="button">+</button>
    </div>
</div>
